name: rota_uefs

services:
  backend:
    build: ./backend
    image: rota_uefs_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backend/app/database/scheduler_data:/app/app/database/scheduler_data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      DATABASE_URL: postgresql+asyncpg://user:password@db:5432/meu_banco
    depends_on:
      - db

  frontend:
    build: ./frontend
    image: rota_uefs_frontend
    command: npm start
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - node_modules:/app/node_modules
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      CHOKIDAR_INTERVAL: "100" 
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: meu_banco
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
  node_modules:
  scheduler_data: