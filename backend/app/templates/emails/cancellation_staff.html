<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cancelamento - Rota UEFS</title>
  </head>
  <body style="margin: 0; padding: 0; background-color: #fff5f5; font-family: Arial, Helvetica, sans-serif;">
    <table width="100%" cellpadding="0" cellspacing="0" style="padding: 40px 0;">
      <tr>
        <td align="center">
          <table width="600" cellpadding="0" cellspacing="0" style="background-color: #ffffff; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.05);">
            <tr>
              <td style="background: linear-gradient(135deg, #d32f2f 0%, #b71c1c 100%); padding: 32px 36px;">
                <h1 style="color: #ffffff; margin: 0; font-size: 26px;">ROTA <span style="color: #ffcdd2;">UEFS</span></h1>
                <p style="color: rgba(255,255,255,0.8); font-size: 12px; font-weight: bold;">CANCELAMENTO CONFIRMADO</p>
              </td>
            </tr>
            <tr>
              <td style="padding: 40px 42px;">
                <h2 style="color: #0a1f4e;">Olá, {{ name }}</h2>
                <p style="font-size: 15px; color: #4a5568; line-height: 1.7;">
                  Confirmamos o cancelamento da sua reserva para a viagem <strong>{{ trip_name }}</strong>. Sua vaga foi liberada para outros usuários.
                </p>
                <p style="font-size: 14px; color: #e53935; margin-top: 20px; font-weight: bold;">
                  Sentiremos sua falta nesta viagem!
                </p>
              </td>
            </tr>
            <tr><td style="background: #0a1f4e; padding: 20px; text-align: center; color: #ffffff; font-size: 11px;">© 2026 Rota UEFS</td></tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
