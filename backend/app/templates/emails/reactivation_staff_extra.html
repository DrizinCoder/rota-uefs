<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>
  <body style="margin: 0; padding: 0; background-color: #f0f4f8; font-family: Arial, Helvetica, sans-serif;">
    <table width="100%" cellpadding="0" cellspacing="0" style="padding: 40px 0;">
      <tr>
        <td align="center">
          <table width="600" cellpadding="0" cellspacing="0" style="background-color: #ffffff; border-radius: 16px; overflow: hidden;">
            <tr>
              <td style="background: linear-gradient(135deg, #0288d1 0%, #01579b 100%); padding: 32px 36px;">
                <h1 style="color: #ffffff; margin: 0;">ROTA <span style="color: #4fc3f7;">UEFS</span></h1>
                <p style="color: #ffffff; font-size: 12px;">REATIVAÇÃO DE ACOMPANHANTE</p>
              </td>
            </tr>
            <tr>
              <td style="padding: 40px 42px;">
                <h2 style="color: #0a1f4e;">Olá, {{ name }}</h2>
                <p style="font-size: 15px; color: #4a5568;">
                  A reserva para o seu convidado(a) <strong>{{ extra_name }}</strong> na viagem <strong>{{ trip_name }}</strong> foi reativada com sucesso.
                </p>
                <p style="font-size: 14px; color: #718096; border-top: 1px solid #edf2f7; padding-top: 20px;">
                  O voucher de embarque já está disponível no sistema.
                </p>
              </td>
            </tr>
            <tr><td style="background: #0a1f4e; padding: 20px; text-align: center; color: #ffffff; font-size: 11px;">© 2026 Rota UEFS</td></tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
