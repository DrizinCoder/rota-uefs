<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>{{ log.title }}</title>
    <style>
        @page {
            size: A4;
            margin: 40px 40px 60px 40px;
            @bottom-center {
                content: element(footerContent);
                width: 100%;
            }
        }

        body { 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            padding: 0;
            color: #1e293b; 
        }

        .header { display: flex; justify-content: space-between; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; margin-bottom: 20px; }
        .title { font-size: 24px; font-weight: bold; color: #0f172a; }
        .date { color: #64748b; font-size: 14px; margin-top: auto; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; page-break-inside: auto; }
        tr { page-break-inside: avoid; page-break-after: auto; }
        
        th, td { border-bottom: 1px solid #cbd5e1; padding: 12px; text-align: left; font-size: 14px; }
        th { background-color: #f8fafc; font-weight: bold; text-transform: uppercase; font-size: 12px; }
        
        .footer { 
            position: running(footerContent); 
            text-align: center; 
            font-size: 10px; 
            color: #94a3b8; 
            border-top: 1px solid #e2e8f0; 
            padding-top: 5px;
        }
        
        .info-grid { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 20px; 
            margin-bottom: 30px; 
            background-color: #f8fafc; 
            padding: 15px; 
            border-radius: 8px; 
        }
        .info-item { 
            flex: 1; 
            min-width: 180px;
            word-wrap: break-word;
            word-break: break-all; 
        }
        .info-label { font-size: 12px; color: #64748b; font-weight: bold; text-transform: uppercase; }
        .info-value { font-size: 15px; color: #0f172a; font-weight: bold; margin-top: 4px; }

        /* Quebra de página para o WeasyPrint 
        .trip-section { page-break-inside: avoid; }
        .trip-section + .trip-section { page-break-before: always; }*/
    </style>
</head>
<body>
    <div class="header">
        <div class="title">{{ log.title }}</div>
        <div class="date">Gerado em: {{ log.timestamp }}</div>
    </div>

    <div class="content">
        {% block content %}{% endblock %}
    </div>

    <div class="footer">
        Rota UEFS - Sistema de Gestão de Frota | Documento gerado eletronicamente.
    </div>
</body>
</html>
