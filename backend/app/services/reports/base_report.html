<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>{{ titulo_relatorio }}</title>
    <style>
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; padding: 30px; color: #1e293b; }
        .header { display: flex; justify-content: space-between; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; margin-bottom: 20px; }
        .title { font-size: 24px; font-weight: bold; color: #0f172a; }
        .date { color: #64748b; font-size: 14px; margin-top: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border-bottom: 1px solid #cbd5e1; padding: 12px; text-align: left; }
        th { background-color: #f8fafc; font-weight: bold; text-transform: uppercase; font-size: 12px; }
        .footer { position: fixed; bottom: 30px; width: 100%; text-align: center; font-size: 10px; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">{{ titulo_relatorio }}</div>
        <div class="date">Gerado em: {{ data_geracao }}</div>
    </div>

    <div class="content">
        <p>A arquitetura desacoplada do gerador de PDF está pronta para receber os dados do sistema.</p>
    </div>

    <div class="footer">
        Rota UEFS - Sistema de Gestão de Frota
    </div>
</body>
</html>
